name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决 Node.js 警告（可选）

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安装基础依赖
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib seaborn scikit-learn
          pip install rdkit-pypi
          pip install pyinstaller

      - name: 安装 PyTorch (CPU 版)
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: 安装 PyTorch Geometric
        run: |
          pip install torch-geometric

      - name: 用 PyInstaller 打包
        run: |
          pyinstaller --onedir --name DiffGAT `
            --collect-all rdkit `
            --collect-all torch `
            --collect-all torch_geometric `
            --collect-all sklearn `
            --hidden-import sklearn.neighbors._partition_nodes `
            --hidden-import sklearn.utils._typedefs `
            --hidden-import rdkit.RDPaths `
            --hidden-import rdkit.RDLogger `
            launcher.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: DiffGAT-package
          path: dist/DiffGAT/
